name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'agent/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agent/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: agent

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: agent

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build runtime (${{ matrix.goarch }})
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o /dev/null ./cmd/runtime/
      - name: Build CLI (${{ matrix.goarch }})
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o /dev/null ./cmd/buzzpi/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test -short -count=1 ./...
      - name: Race detection
        run: go test -race -short -count=1 ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Generate coverage report
        run: go test -coverprofile=coverage.out -covermode=atomic -count=1 ./...
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: agent/coverage.out
      - name: Check coverage threshold
        run: |
          go tool cover -func=coverage.out | tail -1
          COVER=$(go tool cover -func=coverage.out | grep 'total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVER}%"
          if (( $(echo "$COVER < 50" | bc -l) )); then
            echo "FAIL: Coverage ${COVER}% is below 50% threshold"
            exit 1
          fi
          echo "PASS: Coverage ${COVER}% meets threshold"
